<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyserguiden — Kommer snart</title>
<meta name="description" content="Gyserguiden — Danmarks nye site om horror i alle dens former. Film, serier, spil, bøger og brætspil. Kommer snart.">
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:            #0a0908;
    --text:          #ede4d3;
    --text-muted:    #8a8175;
    --text-dim:      #5a5247;
    --accent:        #a01818;
    --accent-bright: #c42323;
    --gold:          #b89968;
    --border:        #2a2420;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }

  /* Grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
  }

  /* Atmosfærisk baggrund */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 60%, rgba(160, 24, 24, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 40%, rgba(42, 10, 10, 0.3) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px 24px;
    max-width: 640px;
  }

  /* Logo */
  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 64px;
    display: block;
  }
  .logo .dot {
    color: var(--accent);
    animation: pulse 3s ease-in-out infinite;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 48px;
    position: relative;
  }
  .divider::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    background: var(--accent);
  }

  /* Tagline */
  .tagline {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent-bright);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* Heading */
  h1 {
    font-size: clamp(36px, 6vw, 60px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
    font-weight: 600;
  }

  /* Body text */
  p {
    font-size: 17px;
    color: var(--text-muted);
    line-height: 1.65;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Footer */
  .footer-note {
    position: fixed;
    bottom: 32px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    z-index: 2;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo       { animation: fadeUp 0.7s ease-out 0.1s both; }
  .divider    { animation: fadeUp 0.7s ease-out 0.25s both; }
  .tagline    { animation: fadeUp 0.7s ease-out 0.35s both; }
  h1          { animation: fadeUp 0.7s ease-out 0.45s both; }
  p           { animation: fadeUp 0.7s ease-out 0.6s both; }
  .footer-note { animation: fadeUp 0.7s ease-out 0.8s both; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="wrapper">
  <span class="logo">gyserguiden<span class="dot">.</span></span>

  <div class="divider"></div>

  <div class="tagline">Dansk horror i alle dens former</div>

  <h1>Noget <em>uhyggeligt</em><br>er på vej</h1>

  <p>Vi er ved at bygge Danmarks nye destination for horror — film, serier, spil, bøger og brætspil. Anmeldelser, nyheder, guides og interaktive tools. Kom tilbage snart.</p>
</div>

<div class="footer-note">© 2026 Gyserguiden · Lavet i Danmark</div>

</body>
</html>
